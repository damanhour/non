<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>هدية عيد ميلاد 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #ffd1dc, #f8a5c2, #ff7979);
      background-size: 400% 400%;
      animation: gradientBG 18s ease infinite;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      font-family: 'Cairo', sans-serif;
      overflow: hidden;
      position: relative;
      padding: 20px 10px 40px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .happy-text {
      font-size: 2.9rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
      cursor: pointer;
      padding: 18px 35px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      transition: all 0.4s ease;
      z-index: 10;
      font-family: 'Dancing Script', cursive;
      margin-top: 30px;
    }

    #birthdayImage {
      max-width: 90%;
      max-height: 60vh;
      border-radius: 20px;
      margin-top: 25px;
      display: none;
      border: 4px solid white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }

    #wishMessage {
      font-size: 1.8rem;
      color: white;
      text-shadow: 0 0 12px rgba(255, 105, 180, 0.9);
      margin-top: 20px;
      font-family: 'Dancing Script', cursive;
      text-align: center;
      display: none;
      z-index: 10;
      line-height: 1.5;
    }

    #passwordInput {
      display: none;
      margin-top: 20px;
      padding: 10px 15px;
      font-size: 1.2rem;
      text-align: center;
      border: 2px solid #ff9ff3;
      border-radius: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.5);
      color: #e84393;
      font-weight: bold;
      width: 65%;
      z-index: 10;
      font-family: 'Cairo', sans-serif;
    }

    #loveMessage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      font-family: 'Dancing Script', cursive;
      color: #ff0066;
      text-shadow: 
        0 0 20px #ff66b2,
        0 0 40px #ff3399,
        0 0 60px #ff0066;
      font-weight: bold;
      display: none;
      z-index: 20;
      animation: pulseGlow 1.8s infinite alternate;
      text-align: center;
    }

    @keyframes pulseGlow {
      from { transform: translate(-50%, -50%) scale(1); }
      to { transform: translate(-50%, -50%) scale(1.04); }
    }

    .heart {
      position: absolute;
      font-size: 22px;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }

    @media (max-width: 600px) {
      .happy-text { font-size: 2.3rem; padding: 14px 25px; }
      #wishMessage { font-size: 1.5rem; }
      #loveMessage { font-size: 4rem; }
      #passwordInput { font-size: 1.1rem; width: 75%; }
    }
  </style>
</head>
<body>

  <div id="loveMessage">بحبك</div>

  <div class="happy-text" id="happyText">Happy Birthday</div>
  <img id="birthdayImage" alt="عيد ميلاد سعيد">
  <div id="wishMessage">كل سنة وانتِ طيبة<br>ينوري 💖</div>
  <input type="password" id="passwordInput" placeholder="كلمة السر..." maxlength="5">

  <audio id="birthdaySong" loop></audio>

  <script>
    const happyText = document.getElementById('happyText');
    const birthdayImage = document.getElementById('birthdayImage');
    const wishMessage = document.getElementById('wishMessage');
    const birthdaySong = document.getElementById('birthdaySong');
    const passwordInput = document.getElementById('passwordInput');
    const loveMessage = document.getElementById('loveMessage');

    happyText.addEventListener('click', () => {
      happyText.style.display = 'none';
      
      // تحميل الصورة من نفس المجلد
      birthdayImage.src = 'birthday.png';
      birthdayImage.style.display = 'block';
      
      wishMessage.style.display = 'block';
      
      // تحميل الأغنية من نفس المجلد
      birthdaySong.src = 'song.mp3';
      birthdaySong.loop = true;
      birthdaySong.load();
      birthdaySong.play().catch(e => console.warn("الصوت يحتاج تفاعل:", e));
      
      passwordInput.style.display = 'block';
      
      // بدء القلوب تحت الجملة
      startHeartsUnderWish();
    });

    passwordInput.addEventListener('input', (e) => {
      if (e.target.value === '24/11') {
        birthdayImage.style.display = 'none';
        wishMessage.style.display = 'none';
        passwordInput.style.display = 'none';
        
        if (window.heartInterval) clearInterval(window.heartInterval);
        
        loveMessage.style.display = 'block';
        startStormHearts();
      }
    });

    function startHeartsUnderWish() {
      window.heartInterval = setInterval(() => {
        const rect = wishMessage.getBoundingClientRect();
        if (rect.width === 0) return;
        
        const x = rect.left + Math.random() * rect.width;
        const y = rect.bottom + 10;
        createHeart(x, y, '#ff6b9d', 2500);
      }, 350);
    }

    function startStormHearts() {
      setInterval(() => {
        for (let i = 0; i < 8; i++) {
          const x = Math.random() * window.innerWidth;
          const y = window.innerHeight + 20;
          const color = ['#ff0066', '#ff66b2', '#ff3399'][Math.floor(Math.random() * 3)];
          createHeart(x, y, color, 4000 + Math.random() * 2000);
        }
      }, 250);
    }

    function createHeart(x, y, color, duration) {
      const heart = document.createElement('div');
      heart.innerHTML = '❤️';
      heart.classList.add('heart');
      heart.style.left = x + 'px';
      heart.style.top = y + 'px';
      heart.style.color = color;
      heart.style.fontSize = (Math.random() * 20 + 18) + 'px';
      document.body.appendChild(heart);

      const distance = - (80 + Math.random() * window.innerHeight * 0.7);
      const rotate = (Math.random() > 0.5 ? '' : '-') + (180 + Math.random() * 180);

      heart.animate([
        { transform: 'translateY(0) scale(0.7) rotate(0deg)', opacity: 1 },
        { transform: `translateY(${distance}px) rotate(${rotate}deg) scale(1.3)`, opacity: 0 }
      ], {
        duration: duration,
        easing: 'cubic-bezier(0.1, 0.9, 0.3, 1)'
      });

      setTimeout(() => {
        if (heart.parentNode) heart.parentNode.removeChild(heart);
      }, duration);
    }
  </script>

</body>
</html>
